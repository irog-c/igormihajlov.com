baseURL = 'https://igormihajlov.com/'
languageCode = 'en-us'
title = 'Igor Mihajlov | Backend Engineer — Go, TypeScript & Distributed Systems'
theme = 'terminal'
pagination.pagerSize = 5
enableRobotsTXT = true
enableGitInfo = true

[markup.highlight]
  lineNos = true
  lineNumbersInTable = false
  noClasses = false

[markup.goldmark.renderer]
  unsafe = true

[params]
    contentTypeName = 'home'
    showMenuItems = 4
    fullWidthTheme = false
    centerTheme = true
    readMore = 'Read more'
    showLastUpdated = true
    Toc = true
    readingTime = true

[languages]
    [languages.en]
        title = 'Igor Mihajlov | Backend Engineer — Go, TypeScript & Distributed Systems'
        copyright = ''
        menuMore = 'Show more'
        readMore = 'Read more'
        readOtherPosts = 'Read other posts'

    [languages.en.params]
        subtitle = 'Backend Engineer based in Belgrade, Serbia. Specializing in Go, TypeScript, distributed systems, microservices, and cloud infrastructure.'
        keywords = 'backend engineer, go, golang, microservices, distributed systems, software engineer, Belgrade, Serbia'

    [languages.en.params.logo]
        logoText = 'IGOR MIHAJLOV'
        logoHomeLink = '/'

    [languages.en.menu]
        [[languages.en.menu.main]]
            identifier = 'home'
            name = 'Home'
            url = '/'
        [[languages.en.menu.main]]
            identifier = 'about'
            name = 'About'
            url = '/about/'
        [[languages.en.menu.main]]
            identifier = 'projects'
            name = 'Projects'
            url = '/projects/'
        [[languages.en.menu.main]]
            identifier = 'posts'
            name = 'Posts'
            url = '/posts/'
 
